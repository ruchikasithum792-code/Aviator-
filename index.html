<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENIZ OFFICIAL - V7 PREMIUM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff0044;
            --secondary: #00f2ff;
            --success: #00ff88;
            --dark-bg: #05070a;
            --card-bg: rgba(15, 18, 26, 0.95);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Stars */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 200%; height: 200%;
            background: radial-gradient(circle, #fff 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            animation: moveBg 50s linear infinite;
            z-index: -1;
        }

        @keyframes moveBg {
            from { transform: translate(0, 0); }
            to { transform: translate(-50%, -50%); }
        }

        .container {
            background: var(--card-bg);
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(255, 0, 68, 0.3);
            overflow: hidden;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        header {
            background: #161b26;
            padding: 20px;
            border-bottom: 2px solid var(--primary);
        }

        h1 { font-family: 'Orbitron', sans-serif; margin: 0; font-size: 22px; color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        
        #clock { font-size: 14px; color: var(--secondary); margin-top: 5px; font-family: 'Orbitron'; }

        .content { padding: 20px; }

        /* Input Styles */
        input[type="password"] {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid var(--primary);
            border-radius: 10px;
            color: var(--success);
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        /* Button Styles */
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), #990029);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--primary); }

        /* Signal Display */
        .prediction-box {
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #444;
            margin-bottom: 20px;
        }

        .multiplier {
            font-size: 50px;
            font-family: 'Orbitron';
            color: var(--success);
            text-shadow: 0 0 15px var(--success);
            margin: 10px 0;
        }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #222; border: none; color: #888; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }

        .future-list { background: #000; padding: 10px; border-radius: 10px; max-height: 200px; overflow-y: auto; text-align: left; }
        .future-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; font-size: 14px; }

    </style>
</head>
<body>

<audio id="s1" src="https://cdn.pixabay.com/audio/2022/03/15/audio_2d83287313.mp3"></audio>
<audio id="s2" src="https://cdn.pixabay.com/audio/2023/09/21/audio_1f237f3789.mp3"></audio>

<div class="container">
    <header>
        <h1>TENIZ OFFICIAL</h1>
        <div id="clock">00:00:00</div>
    </header>

    <div class="content">
        <div id="loginSection">
            <p style="color:#888">ACCESS REQUIRED</p>
            <input type="password" id="pw" placeholder="PASSWORD">
            <button class="btn" onclick="check()">LOGIN</button>
        </div>

        <div id="appSection" style="display:none">
            <div class="tabs">
                <button class="tab-btn active" id="t1" onclick="tab('live')">LIVE</button>
                <button class="tab-btn" id="t2" onclick="tab('future')">FUTURE</button>
            </div>

            <div id="liveTab">
                <div class="prediction-box">
                    <div style="font-size:12px; color:var(--secondary)">NEXT CRASH</div>
                    <div class="multiplier" id="val">--</div>
                    <div id="st" style="font-size:11px; color:#555">READY</div>
                </div>
                <button class="btn" id="gBtn" onclick="gen()">GENERATE NOW</button>
            </div>

            <div id="futureTab" style="display:none">
                <div class="future-list" id="fList">
                    <p style="text-align:center; color:#555">No data generated</p>
                </div>
                <button class="btn" style="margin-top:10px; background:#333" onclick="genF()">GET SCHEDULE</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Clock
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function check() {
        if(document.getElementById('pw').value === "teniz2026") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
        } else { alert("Wrong Password!"); }
    }

    function tab(type) {
        document.getElementById('liveTab').style.display = type === 'live' ? 'block' : 'none';
        document.getElementById('futureTab').style.display = type === 'future' ? 'block' : 'none';
        document.getElementById('t1').classList.toggle('active', type === 'live');
        document.getElementById('t2').classList.toggle('active', type === 'future');
    }

    function sound(id) { document.getElementById(id).play(); }

    function getVal() {
        let r = Math.random() * 100;
        if(r < 70) return (Math.random() * (2.2 - 1.1) + 1.1).toFixed(2);
        return (Math.random() * (15.0 - 2.2) + 2.2).toFixed(2);
    }

    function gen() {
        sound('s1');
        const b = document.getElementById('gBtn');
        b.disabled = true;
        document.getElementById('st').innerText = "ANALYZING...";
        setTimeout(() => {
            document.getElementById('val').innerText = getVal() + "x";
            document.getElementById('st').innerText = "SUCCESS";
            sound('s2');
            b.disabled = false;
        }, 2000);
    }

    function genF() {
        sound('s1');
        const l = document.getElementById('fList');
        l.innerHTML = "";
        let now = new Date();
        for(let i=1; i<=6; i++) {
            let fTime = new Date(now.getTime() + (i * 2 * 60000)).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            l.innerHTML += `<div class="future-item"><span>${fTime}</span><span style="color:var(--success)">${getVal()}x</span></div>`;
        }
        sound('s2');
    }
</script>

</body>
</html>
