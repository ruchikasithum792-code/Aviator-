<button class="tab-btn" onclick="switchTab('future')">FUTURE LIST</button>
        </div>

        <div id="liveTab">
            <div class="prediction-box">
                <div style="font-size: 12px; color: var(--secondary);">NEXT ESTIMATED CRASH</div>
                <div class="multiplier" id="liveVal">--</div>
                <div id="statusTxt" style="font-size: 11px; color: #555;">READY TO ANALYZE</div>
            </div>
            <button class="main-btn" id="genBtn" onclick="generateLive()">GENERATE NOW</button>
        </div>

        <div id="futureTab" style="display: none;">
            <div style="font-size: 12px; color: #888; margin-bottom: 10px; text-align: center;">UPCOMING SIGNALS (NEXT 10 MINS)</div>
            <div class="future-list" id="futureList">
                <p style="text-align:center; color:#444; padding:20px;">Click generate to see schedule</p>
            </div>
            <button class="main-btn" style="margin-top:10px; background: #222;" onclick="generateFuture()">GET FUTURE SCHEDULE</button>
        </div>
    </div>
</div>

<script>
    // Clock
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function login() {
        if(document.getElementById('passInput').value === "teniz2026") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else { alert("Wrong Password!"); }
    }

    function switchTab(tab) {
        document.getElementById('liveTab').style.display = tab === 'live' ? 'block' : 'none';
        document.getElementById('futureTab').style.display = tab === 'future' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (tab === 'live' && i === 0) || (tab === 'future' && i === 1)));
    }

    function triggerEffects() {
        document.getElementById('clickSound').play();
        if (navigator.vibrate) navigator.vibrate(100);
    }

    function getRand() {
        let r = Math.random() * 100;
        if (r < 70) return (Math.random() * (2.20 - 1.10) + 1.10).toFixed(2);
        if (r < 95) return (Math.random() * (7.00 - 2.21) + 2.21).toFixed(2);
        return (Math.random() * (25.00 - 7.01) + 7.01).toFixed(2);
    }

    function generateLive() {
        triggerEffects();
        const btn = document.getElementById('genBtn');
        btn.disabled = true;
        document.getElementById('statusTxt').innerText = "ANALYZING SERVER...";
        
        setTimeout(() => {
            document.getElementById('liveVal').innerText = getRand() + "x";
            document.getElementById('statusTxt').innerText = "SIGNAL CAPTURED";
            document.getElementById('doneSound').play();
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            btn.disabled = false;
        }, 2000);
    }

    function generateFuture() {
        triggerEffects();
        const list = document.getElementById('futureList');
        list.innerHTML = "";
        let now = new Date();

        for(let i=1; i<=8; i++) {
            let futureTime = new Date(now.getTime() + (i * 1.5 * 60000));
            let timeStr = futureTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let val = getRand();
            
            list.innerHTML += `
                <div class="future-item">
                    <span style="color:var(--secondary)">${timeStr}</span>
                    <span style="color:white; font-weight:bold;">→</span>
                    <span style="color:var(--success); font-weight:bold;">${val}x</span>
                </div>
            `;
        }
        document.getElementById('doneSound').play();
    }
</script>

</body>
</html>
