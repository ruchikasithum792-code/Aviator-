<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENIZ OFFICIAL - Pro Signal Bot</title>
    <style>
        :root {
            --primary-color: #ff0044;
            --bg-dark: #0b0e11;
            --card-bg: #1e2329;
            --success: #02c076;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Loading Animation */
        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            width: 380px;
            text-align: center;
            border: 2px solid #333;
            position: relative;
            animation: fadeInScale 0.6s ease-out;
        }

        h2 { 
            color: var(--primary-color); 
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(255, 0, 68, 0.4);
        }

        .input-group { margin-bottom: 20px; }

        input {
            width: 85%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #0b0e11;
            color: #02c076;
            font-size: 16px;
            text-align: center;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 10px rgba(255, 0, 68, 0.2); }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff0044, #990029);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 0, 68, 0.4); }

        /* Signal Section Styles */
        #signalDisplay { display: none; }

        .multiplier-box {
            background: #2b3139;
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            border-left: 5px solid var(--success);
        }

        .multiplier {
            font-size: 45px;
            color: var(--success);
            font-weight: 800;
            margin: 10px 0;
        }

        .status-bar { font-size: 12px; color: #848e9c; margin-bottom: 10px; }

        /* Keyframes */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-value { animation: countUp 0.4s ease-out; }

        /* Scanning Animation */
        .scanning {
            font-size: 14px;
            color: #ffb100;
            display: none;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>TENIZ OFFICIAL</h2>
    
    <div id="loginSection">
        <div class="input-group">
            <input type="password" id="passInput" placeholder="ENTER ACCESS CODE">
        </div>
        <button onclick="checkPassword()">Verify Access</button>
        <p style="font-size: 11px; color: #555; margin-top: 15px;">v2.0 Beta - Powered by Teniz Algorithms</p>
    </div>

    <div id="signalDisplay">
        <div class="status-bar">SYSTEM STATUS: <span style="color:var(--success)">CONNECTED</span></div>
        <div class="scanning" id="scanText">ANALYZING SERVER DATA...</div>
        
        <div class="multiplier-box">
            <div style="font-size: 14px; color: #aaa;">PREDICTED NEXT CRASH</div>
            <div class="multiplier" id="nextValue">0.00x</div>
        </div>

        <button onclick="getSignal()" id="btnSignal" style="background: linear-gradient(45deg, #02c076, #017a4b);">Generate Next Signal</button>
        <p id="accuracy" style="font-size: 12px; color: #848e9c; margin-top: 15px;">Accuracy: --%</p>
    </div>
</div>

<script>
    function checkPassword() {
        const pass = document.getElementById('passInput').value;
        if(pass === "teniz2026") {
            const loginBox = document.getElementById('loginSection');
            loginBox.style.animation = "fadeInScale 0.4s reverse forwards";
            setTimeout(() => {
                loginBox.style.display = 'none';
                const mainSec = document.getElementById('signalDisplay');
                mainSec.style.display = 'block';
                mainSec.style.animation = "fadeInScale 0.5s ease-out";
            }, 400);
        } else {
            alert("අවසර නැත! නිවැරදි මුරපදය ඇතුළත් කරන්න.");
        }
    }

    function getSignal() {
        const btn = document.getElementById('btnSignal');
        const scan = document.getElementById('scanText');
        const valTxt = document.getElementById('nextValue');
        const accTxt = document.getElementById('accuracy');

        btn.disabled = true;
        btn.innerText = "CALCULATING...";
        scan.style.display = 'block';
        valTxt.innerText = "---";

        // ගණිතමය සිමියුලේෂන් එකක් සඳහා ප්‍රමාදයක් (Delay) ලබා දීම
        setTimeout(() => {
            // සුපිරි ගණිත ක්‍රමය (Math Logic):
            // 60% අවස්ථාවල 1.20 - 2.50 අතර
            // 30% අවස්ථාවල 2.50 - 5.00 අතර
            // 10% අවස්ථාවල 5.00 - 15.00 අතර
            let prob = Math.random() * 100;
            let finalVal;

            if (prob < 60) {
                finalVal = (Math.random() * (2.50 - 1.20) + 1.20).toFixed(2);
            } else if (prob < 90) {
                finalVal = (Math.random() * (5.00 - 2.50) + 2.50).toFixed(2);
            } else {
                finalVal = (Math.random() * (15.00 - 5.00) + 5.00).toFixed(2);
            }

            // Accuracy එක අහඹු ලෙස පෙන්වීම
            let accuracy = (Math.random() * (98.5 - 85.0) + 85.0).toFixed(1);

            valTxt.innerText = finalVal + "x";
            valTxt.classList.add('animate-value');
            accTxt.innerText = "Prediction Accuracy: " + accuracy + "%";
            
            scan.style.display = 'none';
            btn.disabled = false;
            btn.innerText = "Generate Next Signal";

            // Animation එක අලුත් කිරීමට class එක ඉවත් කිරීම
            setTimeout(() => valTxt.classList.remove('animate-value'), 400);

        }, 1500); // තත්පර 1.5 කින් ප්‍රතිඵලය ලැබේ
    }
</script>

</body>
</html>
