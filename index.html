<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENIZ OFFICIAL - Ultimate Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff0044;
            --neon-green: #00ff88;
            --bg-color: #05070a;
            --panel-bg: #12161f;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Login & Main Container */
        .app-container {
            background: var(--panel-bg);
            width: 380px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 0 30px rgba(255, 0, 68, 0.2);
            border: 1px solid #2a2f3b;
            text-align: center;
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-red);
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 0, 68, 0.5);
        }

        .subtitle {
            font-size: 10px;
            letter-spacing: 2px;
            color: #6b7280;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* Form Elements */
        input[type="password"] {
            width: 80%;
            padding: 15px;
            background: #05070a;
            border: 1px solid #333;
            border-radius: 12px;
            color: var(--neon-green);
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--neon-red); box-shadow: 0 0 10px rgba(255, 0, 68, 0.3); }

        .btn {
            background: linear-gradient(135deg, #ff0044, #800022);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 90%;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(255, 0, 68, 0.4); }

        /* Signal Area */
        #mainContent { display: none; }

        .signal-card {
            background: #1a202c;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border-bottom: 4px solid var(--neon-green);
        }

        .time-stamp {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 10px;
        }

        .multiplier {
            font-family: 'Orbitron', sans-serif;
            font-size: 50px;
            color: var(--neon-green);
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .loading-bar {
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: var(--neon-red);
            transition: width 1.5s linear;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .pulse { animation: pulseAnim 1s infinite; }
        @keyframes pulseAnim { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    </style>
</head>
<body>

<div class="app-container">
    <h1>TENIZ OFFICIAL</h1>
    <div class="subtitle">Premium Signal Algorithm</div>

    <div id="loginSection">
        <input type="password" id="passInput" placeholder="ENTER ACCESS KEY">
        <button class="btn" onclick="verify()">Login to Server</button>
    </div>

    <div id="mainContent">
        <div class="time-stamp" id="currentTime">TIME: --:--:--</div>
        
        <div class="signal-card">
            <div style="font-size: 11px; color: #6b7280;">ALGORITHM PREDICTION</div>
            <div class="multiplier" id="signalValue">0.00x</div>
            <div id="lastUpdated" style="font-size: 10px; color: #4b5563;">Waiting for Command...</div>
        </div>

        <div class="loading-bar" id="loader">
            <div class="loading-progress" id="progress"></div>
        </div>

        <button class="btn" id="genBtn" onclick="generate()" style="background: linear-gradient(135deg, #00ff88, #008044);">Get Next Signal</button>
    </div>
</div>

<script>
    // සෑම තත්පරයකම වෙලාව අලුත් කිරීම
    setInterval(() => {
        const now = new Date();
        document.getElementById('currentTime').innerText = "LIVE TIME: " + now.toLocaleTimeString();
    }, 1000);

    function verify() {
        const pass = document.getElementById('passInput').value;
        if(pass === "teniz2026") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        } else {
            alert("වැරදි මුරපදයක්!");
        }
    }

    function generate() {
        const btn = document.getElementById('genBtn');
        const loader = document.getElementById('loader');
        const progress = document.getElementById('progress');
        const signalTxt = document.getElementById('signalValue');
        const lastUpd = document.getElementById('lastUpdated');

        btn.disabled = true;
        loader.style.display = 'block';
        progress.style.width = '100%';
        signalTxt.classList.add('pulse');
        signalTxt.innerText = "ANALYZING";

        setTimeout(() => {
            // සුපිරි ගණිත ක්‍රමය (Probabilistic Calculation)
            let chance = Math.random() * 100;
            let result;

            if (chance < 70) { // 70% ක්ම 1.10 - 2.80 අතර (Safe zones)
                result = (Math.random() * (2.80 - 1.10) + 1.10).toFixed(2);
            } else if (chance < 95) { // 25% ක් 2.80 - 8.00 අතර (Medium)
                result = (Math.random() * (8.00 - 2.80) + 2.80).toFixed(2);
            } else { // 5% ක් පමණක් 10x ට වැඩි (High risk)
                result = (Math.random() * (25.00 - 10.00) + 10.00).toFixed(2);
            }

            const now = new Date();
            signalTxt.innerText = result + "x";
            lastUpd.innerText = "LAST SIGNAL GENERATED AT: " + now.toLocaleTimeString();
            
            // Reset loader and button
            btn.disabled = false;
            loader.style.display = 'none';
            progress.style.width = '0%';
            signalTxt.classList.remove('pulse');
        }, 1500);
    }
</script>

</body>
</html>
